# Demo network inventory for scripts and automation.
# Fill in hostnames, management URLs, versions, and serial numbers before running
# workflows that contact devices or generate activation materials.

network:
  name: sdwan-demo
  description: One Orchestrator with three EdgeConnect EC-S-P appliances.

orchestrator:
  hostname: orchestrator-demo
  management_url: https://orchestrator.example.com
  deployment: self-hosted
  air_gap_enabled: null
  version: null

appliances:
