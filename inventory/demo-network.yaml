    model: EC-S-P
    management_url: https://edgeconnect-1.example.com
    serial_number: null
    site: site-1
    role: branch
    ecos_version: null
  - name: edgeconnect-2
    model: EC-S-P
    management_url: https://edgeconnect-2.example.com
    serial_number: null
    site: site-2
    role: branch
    ecos_version: null
  - name: edgeconnect-3
    model: EC-S-P
    management_url: https://edgeconnect-3.example.com
    serial_number: null
    site: site-3
    role: branch
    ecos_version: null
